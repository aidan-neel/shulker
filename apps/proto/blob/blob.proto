syntax = "proto3";

package blob;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/aidan-neel/shulker/apps/proto/gen/go/blob;blob";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    security_definitions: {
        security: {
            key: "Bearer"
            value: {
                type: TYPE_API_KEY
                in: IN_HEADER
                name: "Authorization"
            }
        }
    }
    security: {
        security_requirement: {
            key: "Bearer"
            value: {}
        }
    }
};

service BlobService {
    rpc PutBlob(PutBlobRequest) returns (PutBlobResponse) {
        option (google.api.http) = {
            post: "/blob.BlobService/PutBlob"
            body: "*"
        };
    }
}

message UserBlob {
    string id = 1;
    string user_id = 2;
    string blob_id = 3;
    string path = 4;
    string created_at = 5;
}

message Blob {
    string id = 1;
    string user_id = 2;
    string hash = 3;
    string filepath = 4;
    string mime_type = 5;
    int64 size = 6;
    string created_at = 7;
}

message PutBlobRequest {
    string path = 1;
    bytes data = 2;
    string mime_type = 3;
}

message PutBlobResponse {
    Blob blob = 1;
}
