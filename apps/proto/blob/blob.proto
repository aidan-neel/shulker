syntax = "proto3";

package blob;

import "google/api/annotations.proto";

option go_package = "github.com/aidan-neel/shulker/apps/proto/gen/go/blob;blob";

service BlobService {
    rpc PutBlob(PutBlobRequest) returns (PutBlobResponse) {
        option (google.api.http) = {
            post: "/blob.BlobService/PutBlob"
            body: "*"
        };
    }
}

message Blob {
    string id = 1;
    string user_id = 2;
    string hash = 3;
    string filepath = 4;
    string mime_type = 5;
    int64 size = 6;
    string created_at = 7;
}

message PutBlobRequest {
    string path = 1;
    bytes data = 2;
    string mime_type = 3;
}

message PutBlobResponse {
    Blob blob = 1;
}
