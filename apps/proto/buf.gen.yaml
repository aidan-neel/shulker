version: v2
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-connect-go
    out: gen/go
    opt:
      - paths=source_relative

  - local: protoc-gen-openapiv2
    out: gen/openapi

  - remote: buf.build/bufbuild/es
    out: ../../apps/web/src/lib/gen
    opt:
      - target=ts
      - js_import_style=module
