syntax = "proto3";

package auth;

import "google/api/annotations.proto";
import "common/error.proto";

option go_package = "github.com/aidan-neel/shulker/apps/proto/gen/go/auth;auth";

service AuthService {
    rpc Login(LoginRequest) returns (LoginResult) {
        option (google.api.http) = {
            post: "/auth.AuthService/Login"
            body: "*"
        };
    }

    rpc Register(RegisterRequest) returns (RegisterResult) {
        option (google.api.http) = {
            post: "/auth.AuthService/Register"
            body: "*"
        };
    }
}

message RegisterResult {
  oneof result {
    RegisterResponse success = 1;
    common.ErrorResponse error = 2;
  }
}

message LoginResult {
  oneof result {
    LoginResponse success = 1;
    common.ErrorResponse error = 2;
  }
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
}

message RegisterRequest {
    string email = 1;
    string password = 2;
}

message RegisterResponse {
}

message RefreshRequest {
    string refresh_token = 1;
}

message RefreshResponse {
    Token token = 1;
}

message Token {
    string access_token = 1;
    string refresh_token = 2;
}
